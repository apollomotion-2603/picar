nmpc_node:
  ros__parameters:
    # Vehicle geometry (shared — cùng base repo)
    lf: 0.11
    lr: 0.11

    # Traction force model (từ drive_model.cpp + Nhã's bicycle_model)
    mass: 1.5
    C1: 0.5
    C2: 15.5
    Cm1: 0.28
    Cm2: 0.05
    Cr0: 0.006
    Cr2: 0.011
    cr3: 5.0

    # Solver
    N: 20
    Tf: 1.0
    ctrl_hz: 20
    timeout: 1.0

    # Bounds
    delta_max: 0.6109
    n_max: 0.20
    throttle_min: -1.0
    throttle_max: 1.0
    ddelta_max: 2.0
    dthrottle_max: 10.0
    v_max: 1.5
    v_min: 0.0
    alat_max: 4.0
    along_max: 4.0

    # κ safety
    kappa_max: 2.0

    # Speed adaptation
    kappa_speed_factor: 2.0
    v_min_curve: 0.3

    # EKF
    ekf_timeout: 1.0

    # Target speed (reference cho cost function)
    target_v: 1.0

    # Solver cache — Map 3 DLC
    solver_build_dir: nmpc_build_6state
