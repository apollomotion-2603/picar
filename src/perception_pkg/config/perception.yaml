perception_node:
  ros__parameters:
    # BEV Homography — SIM values (recalibrate cho hardware thật)
    bev_src: [172.0, 151.0, 471.0, 151.0, 609.0, 368.0, 29.0, 368.0]
    bev_dst: [50.0, 0.0, 250.0, 0.0, 250.0, 500.0, 50.0, 500.0]
    bev_width: 300
    bev_height: 500
    bev_scale: 0.0025  # m/px: lane 0.5m = 200px

    # Sliding Window
    n_windows: 10
    win_width: 80
    min_pixels: 20

    # Arc-length
    s_max_m: 0.5
    n_arc: 200

    # Adaptive Threshold
    thresh_block_size: 35
    thresh_c: 10
