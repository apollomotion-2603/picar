perception_node:
  ros__parameters:
    # BEV Homography — SIM values (recalibrate cho hardware thật)
    bev_src: [172.0, 151.0, 471.0, 151.0, 609.0, 365.0, 29.0, 368.0]
    bev_dst: [100.0, 0.0, 300.0, 0.0, 300.0, 500.0, 100.0, 500.0]
    bev_width: 400
    bev_height: 500
    bev_scale: 0.0025  # m/px: lane 0.5m = 200px

    # Sliding Window — Map 1/2/4 (oval / chicane)
    # win_width=80: hẹp hơn DLC (100) → ít nhiễu trên cua oval
    # min_pixels=15: thấp hơn DLC (20) → bắt được pixel ở cua hẹp
    n_windows: 10
    win_width: 80
    min_pixels: 15

    # Arc-length
    s_max_m: 0.7
    n_arc: 200

    # Adaptive Threshold
    thresh_block_size: 35
    thresh_c: 10
